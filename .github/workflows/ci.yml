# PhoTensor CI — the only pipeline for this project.
#
# Mirrors the developer shell from flake.nix / rust-toolchain.toml on an
# Ubuntu runner: Rust 1.96.0, clang+lld linker (forced by .cargo/config.toml),
# maturin for the pyphotensor Python binding, and pnpm+Biome for the docs site.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Keep cargo from auto-fetching the toolchain via rust-toolchain.toml's
  # channel pin; we install it explicitly with dtolnay/rust-toolchain.
  RUSTUP_TOOLCHAIN: "1.96.0"

jobs:
  rust:
    name: Rust (build / test / clippy / fmt)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang + lld (linker pin in .cargo/config.toml)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld
          clang --version
          ld.lld --version

      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          components: rustfmt clippy rust-src
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: cargo doc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --workspace --no-deps

  python:
    name: Python binding (pyphotensor via maturin)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install clang + lld
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang lld

      - name: Install Rust 1.96.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.96.0"
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "."

      - name: Install maturin
        run: pipx install "maturin>=1.12,<2.0"

      - name: Build wheel
        run: |
          cd src/pyphotensor
          maturin build --release

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pyphotensor-wheel
          path: src/pyphotensor/target/wheels/*.whl
          if-no-files-found: error

  docs:
    name: Docs (Rspress + Biome)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml

      - name: Install deps
        run: pnpm install --frozen-lockfile
        working-directory: docs

      - name: Biome lint + format check (no --write)
        run: pnpm exec biome check
        working-directory: docs

      - name: Build
        run: pnpm run build
        working-directory: docs
