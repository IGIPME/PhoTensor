$:
  # vscode 事件：专供页面中点击「云原生开发」按钮启动开发环境用
  vscode:
    # 数组类型，可定义多个开发环境配置
    - runner:
        # 指定CPU核数，内存为 cpus × 2(GB)
        cpus: 8
      # 使用 Docker 构建自定义开发环境镜像
      docker:
        build:
          # 指定 Dockerfile 所在路径（位于仓库根目录）
          dockerfile: Dockerfile
          # 构建上下文路径（仓库根目录）
          context: .
      # 声明云原生开发所需的服务
      services:
        - vscode
        - docker
      # 开发环境启动后自动执行的任务
      stages:
        - name: 打印环境信息
          script: |
            echo "=== Photon Neural Network Framework Dev Environment ==="
            echo "Rust version: $(rustc --version)"
            echo "Python version: $(python --version)"
            echo "Node.js version: $(node --version)"
            echo "pnpm version: $(pnpm --version)"
            echo "======================================================"
        - name: 安装项目依赖
          script: |
            # 如果有 Python 项目，安装依赖
            # pip install -e .
            # 如果有 Node.js 项目，安装依赖
            cd docs && pnpm install
            echo "Dependencies installed successfully."